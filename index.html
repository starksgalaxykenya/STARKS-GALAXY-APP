<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-grid">
    <!-- Left panel -->
    <div class="auth-brand">
      <div class="brand-content">
        <div class="logo-mark">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="14" fill="#2563eb"/>
            <path d="M12 24L20 32L36 16" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="logo-text">TaskFlow</span>
        </div>
        <h1 class="brand-headline">Work smarter,<br><em>ship faster.</em></h1>
        <p class="brand-sub">Your team's tasks, unified. Track everything from idea to done — beautifully.</p>
        <div class="brand-stats">
          <div class="stat-pill"><span>✦</span> Kanban boards</div>
          <div class="stat-pill"><span>✦</span> Real-time sync</div>
          <div class="stat-pill"><span>✦</span> Team collaboration</div>
        </div>
      </div>
      <div class="brand-bg-art"></div>
    </div>

    <!-- Right panel -->
    <div class="auth-form-panel">
      <div class="auth-form-wrap">
        <h2 class="form-title">Welcome back</h2>
        <p class="form-subtitle">Sign in to your workspace</p>

        <div id="auth-error" class="alert alert-error hidden"></div>
        <div id="auth-success" class="alert alert-success hidden"></div>

        <form id="login-form" novalidate>
          <div class="field-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@company.com" required autocomplete="email"/>
          </div>
          <div class="field-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
              <button type="button" class="toggle-pw" tabindex="-1" aria-label="Toggle password">
                <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-row">
            <label class="checkbox-label"><input type="checkbox" id="remember"/> Remember me</label>
            <a href="#" id="forgot-link" class="text-link">Forgot password?</a>
          </div>
          <button type="submit" class="btn-primary btn-full" id="login-btn">
            <span class="btn-text">Sign in</span>
            <span class="btn-loader hidden"></span>
          </button>
        </form>

        <div class="divider"><span>or</span></div>

        <p class="switch-auth">No account? <a href="signup.html" class="text-link">Create one free →</a></p>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { FIREBASE_CONFIG } from "./js/firebase-config.js";

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);

    const loginForm = document.getElementById('login-form');
    const errorBox = document.getElementById('auth-error');
    const successBox = document.getElementById('auth-success');
    const loginBtn = document.getElementById('login-btn');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
      successBox.classList.add('hidden');
    }
    function showSuccess(msg) {
      successBox.textContent = msg;
      successBox.classList.remove('hidden');
      errorBox.classList.add('hidden');
    }
    function setLoading(on) {
      loginBtn.querySelector('.btn-text').classList.toggle('hidden', on);
      loginBtn.querySelector('.btn-loader').classList.toggle('hidden', !on);
      loginBtn.disabled = on;
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      errorBox.classList.add('hidden');
      setLoading(true);
      try {
        const persistence = remember ? browserLocalPersistence : browserSessionPersistence;
        await setPersistence(auth, persistence);
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        const msgs = {
          'auth/user-not-found': 'No account found with this email.',
          'auth/wrong-password': 'Incorrect password. Try again.',
          'auth/invalid-email': 'Please enter a valid email address.',
          'auth/too-many-requests': 'Too many attempts. Try again later.',
          'auth/invalid-credential': 'Invalid email or password.'
        };
        showError(msgs[err.code] || 'Sign in failed. Please try again.');
        setLoading(false);
      }
    });

    document.getElementById('forgot-link').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { showError('Enter your email address first.'); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        showSuccess('Password reset email sent! Check your inbox.');
      } catch (err) {
        showError('Could not send reset email. Check the address and try again.');
      }
    });

    // Toggle password visibility
    document.querySelector('.toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
